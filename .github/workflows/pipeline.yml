name: Controlled Training Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # 1. LINTER (GATEKEEPER)
  linter:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linter
        run: pip install flake8

      - name: Run linter
        run: flake8 .

  # 2. TRAIN (EXPENSIVE JOB)
  train:
    runs-on: ubuntu-latest
    needs: linter

    # Gatekeeper logic
    if: |
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: |
          python train.py || echo "Training failed" > error_logs.txt

      # Runs ONLY if training fails
      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      # Runs ALWAYS
      - name: Cleanup
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."

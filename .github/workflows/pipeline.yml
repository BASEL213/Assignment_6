name: Controlled Training Pipeline (All Success)

on:
  push:
    branches: [ main ]

jobs:
  # 1. LINTER (SUCCESS)
  linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linter
        run: pip install flake8

      - name: Run linter
        run: echo "Linter passed successfully"

  # 2. TRAIN (SUCCESS)
  train:
    runs-on: ubuntu-latest
    needs: linter

    # Force job to run
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: echo "Dependencies installed"

      - name: Train model
        run: echo "Training completed successfully"

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."

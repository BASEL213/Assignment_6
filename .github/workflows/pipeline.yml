name: Controlled Training Pipeline (Train Fails)

on:
  push:
    branches: [ main ]

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install linter
        run: pip install flake8
      - name: Run linter
        run: echo "Linter passed successfully"   # Force success

  train:
    runs-on: ubuntu-latest
    needs: linter
    if: |
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt || true

      - name: Train model
        run: |
          echo "Simulating training failure..."
          exit 1   # force failure

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."
